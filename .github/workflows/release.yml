name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Required for PyPI trusted publishing (OIDC). Safe to keep even if you
    # use a token instead.
    permissions:
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses OIDC trusted publishing by default. To use an API token
          # instead, add a PYPI_API_TOKEN repository secret and set:
          # password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
